name: Test & Report

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_DB: disaster
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio aiosqlite

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/disaster
          DATABASE_URL_SYNC: postgresql://postgres:postgres@localhost:5432/disaster
          JWT_SECRET: yunnan-disaster-jwt-secret-2024
          DEEPSEEK_API_KEY: sk-placeholder
        run: |
          cd backend
          python -m pytest ../tests/ -v --tb=short --junitxml=../reports/pytest.xml
        continue-on-error: true

      - name: Upload backend test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-report
          path: reports/pytest.xml

  frontend-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run frontend tests
        run: cd frontend && npx vitest run --reporter=junit --outputFile=../reports/vitest.xml
        continue-on-error: true

      - name: Upload frontend test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-test-report
          path: reports/vitest.xml
